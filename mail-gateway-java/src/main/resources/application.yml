server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mail-gateway:
  api-key: ${MAIL_GATEWAY_API_KEY:change-me}
  default-from: ${MAIL_GATEWAY_DEFAULT_FROM:no-reply@example.com}

spring:
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}
            required: ${SMTP_STARTTLS_REQUIRED:false}
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${SMTP_TIMEOUT:5000}
          writetimeout: ${SMTP_WRITE_TIMEOUT:5000}
